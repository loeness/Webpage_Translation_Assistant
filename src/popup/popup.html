<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bilingual Text Viewer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>原文预处理</h1>
  <p>先点击下面按钮，再使用 Edge 页面翻译。翻译后点击或划词会显示对应原语言句段。</p>
  <button id="preprocess-btn" type="button">手动启用预处理</button>
  <button id="toggle-feature-btn" class="secondary-btn" type="button">关闭原文显示</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
